---
- name: Show Aruba switch images
  hosts: aoscx
  gather_facts: no

  tasks:
    - name: Show images
      arubanetworks.aoscx.aoscx_command:
        commands:
          - show images
      register: image_out

    - name: Print images output
      ansible.builtin.debug:
        var: image_out.stdout_lines
