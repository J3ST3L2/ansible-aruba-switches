---
- name: Flush BIND cache inside Docker containers on Synology NAS hosts
  hosts: bind_servers
  gather_facts: false
  become: true
  become_method: sudo

  tasks:
    - name: Confirm Docker is available
      ansible.builtin.raw: |
        set -eu

        if command -v docker >/dev/null 2>&1; then
          docker --version
          exit 0
        fi

        if [ -x /usr/local/bin/docker ]; then
          /usr/local/bin/docker --version
          exit 0
        fi

        echo "ERROR: docker not found"
        exit 1
      changed_when: false
      check_mode: false

    - name: Confirm BIND container is running
      ansible.builtin.raw: |
        set -eu

        DOCKER="$(command -v docker || true)"
        if [ -z "$DOCKER" ] && [ -x /usr/local/bin/docker ]; then
          DOCKER="/usr/local/bin/docker"
        fi

        CONTAINER="{{ bind_container }}"

        if ! "$DOCKER" ps --format '{{.Names}}' | grep -Fxq "$CONTAINER"; then
          echo "ERROR: container $CONTAINER is not running"
          echo "Running containers:"
          "$DOCKER" ps --format '{{.Names}}  {{.Image}}  {{.Status}}'
          exit 1
        fi

        echo "OK: $CONTAINER is running"
      changed_when: false
      check_mode: false

    - name: Flush BIND cache inside container
      ansible.builtin.raw: |
        set -eu

        DOCKER="$(command -v docker || true)"
        if [ -z "$DOCKER" ] && [ -x /usr/local/bin/docker ]; then
          DOCKER="/usr/local/bin/docker"
        fi

        CONTAINER="{{ bind_container }}"

        "$DOCKER" exec "$CONTAINER" sh -lc '
          set -eu

          if ! command -v rndc >/dev/null 2>&1; then
            echo "ERROR: rndc not found inside container"
            exit 1
          fi

          rndc flush
          echo "OK: BIND cache flushed inside container"

          rndc status || true
        '
      register: flush_result
      changed_when: "'OK: BIND cache flushed inside container' in flush_result.stdout"
      check_mode: false

    - name: Show flush output
      ansible.builtin.debug:
        msg: "{{ inventory_hostname }} / {{ bind_container }}: {{ flush_result.stdout_lines | default(['No flush output captured']) }}"
